name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # PR / main 푸시 / 태그: 빌드
      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      # 설치기 파일명을 ASCII 영문으로: "my-pc-info_0.1.0_x64-setup.exe"
      # (비ASCII 한글 파일명이 SmartScreen/Defender 휴리스틱을 자극하는지 검증용)
      - name: Rename installer
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $conf    = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $version = $conf.version
          $f = Get-ChildItem $nsisDir -Filter "*.exe" | Select-Object -First 1
          $target = Join-Path $f.DirectoryName "my-pc-info_${version}_x64-setup.exe"
          Rename-Item $f.FullName $target

      - name: Upload NSIS
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe

      # v* 태그: 서명 빌드 + GitHub Release + latest.json 자동 생성
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $conf    = Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json
          $version = $conf.version
          $tag     = "${{ github.ref_name }}"
          $repo    = "${{ github.repository }}"
          $baseUrl = "https://github.com/$repo/releases/download/$tag"
          $nsisDir = "src-tauri/target/release/bundle/nsis"

          $sigFile = Get-ChildItem $nsisDir -Filter "*.nsis.zip.sig" | Select-Object -First 1
          $zipName = $sigFile.Name -replace '\.sig$', ''
          $sig     = (Get-Content $sigFile.FullName -Raw -Encoding UTF8).Trim()

          [ordered]@{
            version  = $version
            notes    = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = "$baseUrl/$zipName"
              }
            }
          } | ConvertTo-Json -Depth 5 | Set-Content "latest.json" -Encoding UTF8NoBOM

          $uploadFiles  = @()
          $uploadFiles += (Get-ChildItem $nsisDir).FullName
          $uploadFiles += (Resolve-Path "latest.json").Path

          $releaseArgs = @($tag, "--title", "내 PC 한눈에 $tag", "--notes", "")
          if ($tag -match '-') { $releaseArgs += "--prerelease" }
          $releaseArgs += $uploadFiles

          gh release create @releaseArgs

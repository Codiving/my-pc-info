name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      # 공백 → 언더스코어, _x64_ko-KR(-setup)? 제거
      - name: Rename artifacts
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          foreach ($f in @(Get-ChildItem $nsisDir)) {
            $n = $f.Name -replace '내 PC 한눈에', '내_PC_한눈에'
            $n = $n      -replace '_x64(?:_[a-z]{2,3}-[A-Z]{2})?(?:-setup)?', ''
            if ($n -ne $f.Name) {
              Rename-Item $f.FullName (Join-Path $f.DirectoryName $n)
            }
          }

      # PR / main 푸시: 빌드 검증 + artifact 보관
      - name: Upload NSIS
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe

      # v* 태그: GitHub Release 생성
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $conf    = Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json
          $version = $conf.version
          $tag     = "${{ github.ref_name }}"
          $repo    = "${{ github.repository }}"
          $baseUrl = "https://github.com/$repo/releases/download/$tag"
          $nsisDir = "src-tauri/target/release/bundle/nsis"

          # 자동 업데이터용 latest.json 생성
          $sigFile = Get-ChildItem $nsisDir -Filter "*.nsis.zip.sig" | Select-Object -First 1
          $zipName = $sigFile.Name -replace '\.sig$', ''
          $sig     = (Get-Content $sigFile.FullName -Raw -Encoding UTF8).Trim()

          [ordered]@{
            version  = $version
            notes    = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = "$baseUrl/$zipName"
              }
            }
          } | ConvertTo-Json -Depth 5 | Set-Content "latest.json" -Encoding UTF8NoBOM

          # 릴리즈 생성 및 파일 업로드
          $uploadFiles  = @()
          $uploadFiles += (Get-ChildItem $nsisDir).FullName
          $uploadFiles += (Resolve-Path "latest.json").Path

          $releaseArgs = @($tag, "--title", "내 PC 한눈에 $tag", "--notes", "")
          if ($tag -match '-') { $releaseArgs += "--prerelease" }
          $releaseArgs += $uploadFiles

          gh release create @releaseArgs
